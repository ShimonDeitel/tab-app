name: Tab
options:
  bundleIdPrefix: com.shimondeitel.bartab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tab:
    type: application
    platform: iOS
    sources:
      - path: Tab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bartab
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TabTests
    dependencies:
      - target: Tab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bartab.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TabUITests
    dependencies:
      - target: Tab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bartab.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tab:
    build:
      targets:
        Tab: all
        TabTests: [test]
        TabUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tab.storekit
    test:
      config: Debug
      storeKitConfiguration: Tab.storekit
      targets:
        - TabTests
        - TabUITests
    archive:
      config: Release
